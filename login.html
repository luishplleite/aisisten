<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - TimePulse AI</title>
    <meta name="description" content="Acesso ao sistema de gestão TimePulse AI.">

    <link rel="icon" href="https://img.icons8.com/fluency/48/time-machine.png" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>

    <link rel="stylesheet" href="css/styles.css">
    
    <style>
        /* Login - styles específicos da página */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, var(--dark-color), #212529);
            color: #333;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }

        .login-container {
            background: white;
            border-radius: var(--border-radius);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 420px;
            overflow: hidden;
            animation: fade-in 0.5s ease-out;
        }

        @keyframes fade-in {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-header {
            background-color: var(--primary-color);
            color: white;
            padding: 2rem 1.5rem;
            text-align: center;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .tagline {
            font-size: 1rem;
            opacity: 0.9;
        }

        .login-form {
            padding: 2rem 1.5rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #ccc;
            border-radius: var(--border-radius);
            font-size: 1rem;
            transition: var(--transition);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(40, 167, 69, 0.2);
        }

        .btn {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: var(--primary-color);
            color: white;
        }

        .btn:hover:not(:disabled) {
            background: var(--primary-dark);
        }
        
        .btn:disabled {
            background-color: #e9ecef;
            color: #6c757d;
            cursor: not-allowed;
        }

        .loading-spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .alert {
            padding: 1rem;
            border-radius: var(--border-radius);
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

    </style>
</head>
<body>

    <div class="login-container" id="loginContainer">
        <div class="login-header">
            <h1 class="logo brand-name">TimePulse AI</h1>
            <p class="tagline">Gestão Inteligente para seu Negócio</p>
        </div>
        <form class="login-form" id="loginForm">
            <div class="alert" id="alertBox"></div>
            <div class="form-group">
                <label for="email" class="form-label">E-mail</label>
                <input type="email" id="email" class="form-input" required autocomplete="email" placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label for="password" class="form-label">Senha</label>
                <input type="password" id="password" class="form-input" required autocomplete="current-password" placeholder="Sua senha">
            </div>
            <div class="form-group" id="instanceGroup" style="display: none;">
                <label for="instance" class="form-label">Selecionar Instância</label>
                <select id="instance" class="form-input">
                    <option value="">Carregando instâncias...</option>
                </select>
            </div>
            <button type="submit" class="btn" id="loginButton">
                <span id="loginButtonText">Entrar</span>
                <div class="loading-spinner" id="loginSpinner" style="display: none;"></div>
            </button>
        </form>
    </div>

    <script>
    let supabase;

    /**
     * Exibe uma caixa de alerta na tela de login.
     * @param {string} message - A mensagem a ser exibida.
     * @param {string} type - O tipo de alerta ('error' ou 'success').
     */
    function showAlert(message, type = 'error') {
        const alertBox = document.getElementById('alertBox');
        alertBox.textContent = message;
        alertBox.className = `alert ${type}`;
        alertBox.style.display = 'block';
    }

    /**
     * Controla o estado visual do botão de login (ativado, desativado, com spinner).
     * @param {boolean} isLoading - True para mostrar o estado de carregamento, false para o estado normal.
     */
    function setLoginButtonState(isLoading) {
        const button = document.getElementById('loginButton');
        const text = document.getElementById('loginButtonText');
        const spinner = document.getElementById('loginSpinner');
        
        button.disabled = isLoading;
        text.style.display = isLoading ? 'none' : 'inline';
        spinner.style.display = isLoading ? 'block' : 'none';
    }

    /**
     * Carrega as instâncias disponíveis para o usuário
     */
    async function loadUserInstances(userId) {
        try {
            const { data: instances, error } = await supabase
                .from('restaurants')
                .select('id, name')
                .eq('owner_id', userId);

            if (error) throw error;

            const instanceSelect = document.getElementById('instance');
            const instanceGroup = document.getElementById('instanceGroup');
            
            if (instances && instances.length > 1) {
                // Se há múltiplas instâncias, mostra o seletor
                instanceGroup.style.display = 'block';
                instanceSelect.innerHTML = '<option value="">Selecione uma instância</option>';
                
                instances.forEach(instance => {
                    const option = document.createElement('option');
                    option.value = instance.id;
                    option.textContent = `${instance.name} (Restaurante)`;
                    option.dataset.instanceId = instance.id;
                    instanceSelect.appendChild(option);
                });
                
                return null; // Retorna null para indicar que precisa de seleção
            } else if (instances && instances.length === 1) {
                // Se há apenas uma instância, seleciona automaticamente
                return {
                    restaurantId: instances[0].id,
                    instanceId: instances[0].id,
                    instanceName: instances[0].name,
                    type: 'restaurant'
                };
            } else {
                throw new Error('Nenhuma instância encontrada para este usuário.');
            }
        } catch (error) {
            console.error('Erro ao carregar instâncias:', error);
            throw new Error('Erro ao carregar instâncias do usuário.');
        }
    }

    /**
     * Função principal que lida com a submissão do formulário de login.
     * @param {Event} event - O evento de submit do formulário.
     */
    async function handleLogin(event) {
        event.preventDefault();
        setLoginButtonState(true);
        showAlert('', 'error');

        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            // 1. Autenticação com Supabase
            const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                email: email,
                password: password
            });

            if (authError) {
                let errorMessage = 'Credenciais inválidas. Verifique seu e-mail e senha.';
                
                if (authError.message.includes('Invalid login credentials')) {
                    errorMessage = 'E-mail ou senha incorretos. Verifique suas credenciais.';
                } else if (authError.message.includes('Email not confirmed')) {
                    errorMessage = 'Email ainda não confirmado. Verifique sua caixa de entrada.';
                } else if (authError.message.includes('User not found')) {
                    errorMessage = 'Usuário não encontrado. Verifique se você já se cadastrou.';
                }
                
                console.error('Erro de autenticação:', authError.message);
                throw new Error(errorMessage);
            }

            const user = authData.user;
            if (!user) {
                throw new Error('Não foi possível obter os dados do usuário após o login.');
            }

            console.log('Usuário autenticado com ID:', user.id);

            // 2. Carrega instâncias do usuário
            const instanceData = await loadUserInstances(user.id);
            
            if (!instanceData) {
                // Se há múltiplas instâncias, aguarda seleção
                setLoginButtonState(false);
                showAlert('Selecione uma instância para continuar.', 'success');
                
                document.getElementById('instance').addEventListener('change', async (e) => {
                    const selectedOption = e.target.selectedOptions[0];
                    if (selectedOption && selectedOption.value) {
                        const instanceInfo = {
                            restaurantId: selectedOption.value,
                            instanceId: selectedOption.dataset.instanceId,
                            instanceName: selectedOption.textContent.split(' (')[0],
                            type: 'restaurant'
                        };
                        await completeLogin(user, instanceInfo);
                    }
                });
                return;
            }

            // 3. Se há apenas uma instância, completa o login automaticamente
            await completeLogin(user, instanceData);

        } catch (error) {
            console.error('Falha no processo de login:', error.message);
            showAlert(error.message, 'error');
            setLoginButtonState(false);
        }
    }

    /**
     * Completa o processo de login salvando dados da instância
     */
    async function completeLogin(user, instanceInfo) {
        try {
            // Gera token de sessão único
            const sessionToken = user.access_token || `session_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
            
            // Salva dados da instância usando INSTANCE_MANAGER
            INSTANCE_MANAGER.setInstance({
                instanceId: instanceInfo.instanceId,
                instanceName: instanceInfo.instanceName,
                token: sessionToken,
                type: instanceInfo.type,
                userEmail: user.email,
                restaurantId: instanceInfo.restaurantId
            });

            console.log('Dados da instância salvos:', {
                instanceId: instanceInfo.instanceId,
                restaurantId: instanceInfo.restaurantId,
                instanceName: instanceInfo.instanceName
            });

            showAlert('Login bem-sucedido! Redirecionando...', 'success');
            
            setTimeout(() => {
                window.location.href = 'gestao_pedidos.html';
            }, 1500);

        } catch (error) {
            console.error('Erro ao completar login:', error);
            showAlert('Erro ao salvar dados da sessão. Tente novamente.', 'error');
            setLoginButtonState(false);
        }
    }
    
    /**
     * Função de inicialização
     */
    document.addEventListener('DOMContentLoaded', async () => {
        console.log('Página de login inicializada.');
        
        // Verifica se já está autenticado
        if (INSTANCE_MANAGER.isAuthenticated()) {
            console.log('Usuário já autenticado. Redirecionando...');
            window.location.href = 'gestao_pedidos.html';
            return;
        }

        // Verificar se há email na URL
        const urlParams = new URLSearchParams(window.location.search);
        const emailFromUrl = urlParams.get('email');
        if (emailFromUrl) {
            document.getElementById('email').value = emailFromUrl;
            document.getElementById('password').focus();
        }
        
        // Inicializa Supabase
        supabase = initializeSupabase();
        
        if (supabase) {
            // Verifica sessão ativa do Supabase
            const { data: { session } } = await supabase.auth.getSession();
            if (session && INSTANCE_MANAGER.isAuthenticated()) {
                console.log('Sessão ativa encontrada. Redirecionando...');
                window.location.href = 'gestao_pedidos.html';
                return;
            }
            
            // Adiciona listener do formulário
            const loginForm = document.getElementById('loginForm');
            loginForm.addEventListener('submit', handleLogin);
            console.log('Formulário de login pronto para uso.');
        } else {
            showAlert('Erro ao carregar configurações. Verifique sua conexão.', 'error');
        }
    });
</script>

</body>
</html>
